<div id="pos-section" class="pos-section">
    <div class="container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon"><i class="fas fa-bolt"></i></div>
                    <span>POS System</span>
                </div>
            </div>
            <div class="sidebar-content">
                <ul class="sidebar-nav">
                    <li id="dashboard_tab" class="sidebar-nav-item active">
                        <i class="fas fa-home"></i><span>Dashboard</span>
                    </li>
                    <li id="customer_tab" class="sidebar-nav-item">
                        <i class="fas fa-users"></i><span>Customers</span>
                    </li>
                    <li id="item_tab" class="sidebar-nav-item">
                        <i class="fas fa-box"></i><span>Items</span>
                    </li>
                    <li id="cart_tab" class="sidebar-nav-item">
                        <i class="fas fa-shopping-cart"></i><span>Cart</span>
                    </li>
                    <li id="order_tab" class="sidebar-nav-item">
                        <i class="fas fa-clipboard-list"></i><span>Orders</span>
                    </li>
                </ul>
            </div>
            <div class="sidebar-footer">
                <button id="logout_btn" class="logout_btn">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </aside>

        <main id="dashboard_content" class="main-content tab-content">
            <div class="dashboard-grid">
                <div class="stat-card primary">
                    <div class="stat-header">
                        <div class="stat-title">Total Revenue</div>
                        <div class="stat-icon primary"><i class="fas fa-dollar-sign"></i></div>
                    </div>
                    <div class="stat-value" id="total_revenue"><span>Rs.</span>0.00</div>
                    <div class="stat-change positive">
                        <i class="fas fa-arrow-up"></i><span>0% from last month</span>
                    </div>
                </div>
                <div class="stat-card secondary">
                    <div class="stat-header">
                        <div class="stat-title">Total Customers</div>
                        <div class="stat-icon secondary"><i class="fas fa-users"></i></div>
                    </div>
                    <div class="stat-value" id="total_customers">0</div>
                    <div class="stat-change positive">
                        <i class="fas fa-arrow-up"></i><span>0% from last month</span>
                    </div>
                </div>
                <div class="stat-card success">
                    <div class="stat-header">
                        <div class="stat-title">Total Orders</div>
                        <div class="stat-icon success"><i class="fas fa-shopping-bag"></i></div>
                    </div>
                    <div class="stat-value" id="total_orders">0</div>
                    <div class="stat-change positive">
                        <i class="fas fa-arrow-up"></i><span>0% from last month</span>
                    </div>
                </div>
                <div class="stat-card warning">
                    <div class="stat-header">
                        <div class="stat-title">Low Stock Products</div>
                        <div class="stat-icon warning">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                    </div>
                    <div class="stat-value" id="low-item">-</div>
                    <div class="stat-change negative" id="low-item-info">
                        <i class="fas fa-arrow-down"></i><span>No low-stock items</span>
                    </div>
                </div>
            </div>
        </main>
